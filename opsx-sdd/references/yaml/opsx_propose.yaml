# ============================================================
# opsx_propose.yaml
# 變更提案 · 產生 artifacts
# 觸發：使用者輸入 /opsx_propose
# ============================================================

module_id: opsx_propose
version: "1.0"
trigger: "/opsx_propose"
description: >
  建立變更提案 — 一步到位建立 change 資料夾並生成所有 planning artifacts。
  依序產出 proposal.md（what & why）、design.md（how）、tasks.md（implementation steps），
  完成後即可進入 /opsx_apply 開始實作。

# ── 輸入參數 ──────────────────────────────────────────────
inputs:
  - field: change_name
    type: string
    required: false
    prompt: "變更名稱（kebab-case）或描述你想建置的內容"
    examples:
      - "add-user-auth"
      - "fix-payment-timeout"
      - "我想加入深色模式支援"
    derive_rule: >
      若使用者輸入描述文字而非 kebab-case 名稱，
      自動推導 kebab-case 名稱（例如「加入使用者認證」→ add-user-auth）。

  - field: schema
    type: string
    required: false
    default: spec-driven
    options: [spec-driven]

# ── 前置條件 ──────────────────────────────────────────────
depends_on: []

# ── 執行邏輯 ──────────────────────────────────────────────
execution:
  mode: sequential

  steps:
    - step: 1
      action: confirm_intent
      description: "確認使用者意圖 — 若無輸入則提問"
      condition: "change_name 為空"
      prompt_user: "你想建置或修復什麼？請描述你想做的事。"
      on_response: "從描述推導 kebab-case 名稱"

    - step: 2
      action: check_existing
      description: "檢查是否有同名 change 已存在"
      filesystem: "讀取 openspec/changes/ 目錄，檢查是否有同名子目錄"
      on_conflict:
        prompt_user: "已存在同名 change「{change_name}」。要繼續該 change 還是建立新的？"
        options:
          - "繼續既有 change"
          - "建立新 change（自動加後綴）"

    - step: 3
      action: create_change
      description: "建立 change 目錄與 .openspec.yaml"
      filesystem: |
        建立 openspec/changes/{change_name}/ 目錄
        寫入 .openspec.yaml：
          schema: spec-driven
          name: {change_name}
          created: "YYYY-MM-DD"
          status: active
          artifacts:
            proposal: pending
            design: pending
            tasks: pending
      init_if_missing: |
        若 openspec/ 目錄不存在，先建立：
          openspec/config.yaml（schema: spec-driven）
          openspec/specs/
          openspec/changes/
      on_success: continue
      on_failure: abort_and_log

    - step: 4
      action: generate_artifacts
      description: "依序生成 artifacts"
      mode: sequential
      sequence: [proposal, design, tasks]

      per_artifact:
        proposal:
          depends_on: []
          sections: [Intent, Scope, Approach]
          note: "說明 WHY 與 WHAT，不涉及 HOW"
          output_path: "openspec/changes/{change_name}/proposal.md"
          on_done: "更新 .openspec.yaml → proposal: done"

        design:
          depends_on: [proposal]
          sections: [Architecture, "Key Decisions", Tradeoffs, Dependencies]
          note: "說明 HOW — 技術方案、架構決策、取捨"
          output_path: "openspec/changes/{change_name}/design.md"
          on_done: "更新 .openspec.yaml → design: done"

        tasks:
          depends_on: [proposal, design]
          sections: ["numbered task groups with checkboxes"]
          note: "每個任務以 `- [ ]` 開頭，粒度適中可逐一實作"
          output_path: "openspec/changes/{change_name}/tasks.md"
          on_done: "更新 .openspec.yaml → tasks: done"

      delta_specs:
        condition: "change 涉及新的需求規格時建立"
        sections: [ADDED, MODIFIED, REMOVED, RENAMED]
        format: |
          ### Requirement: [名稱] + SHALL/MUST/SHOULD 聲明
          #### Scenario: [描述] + GIVEN/WHEN/THEN
        output_path: "openspec/changes/{change_name}/specs/<capability>/spec.md"

    - step: 5
      action: verify_artifacts
      description: "確認所有 artifact 檔案已建立"
      check_files:
        - "openspec/changes/{change_name}/.openspec.yaml"
        - "openspec/changes/{change_name}/proposal.md"
        - "openspec/changes/{change_name}/design.md"
        - "openspec/changes/{change_name}/tasks.md"

    - step: 6
      action: show_final_status
      description: "顯示最終狀態摘要"

# ── 輸出 ──────────────────────────────────────────────────
outputs:
  artifacts:
    - path: "openspec/changes/{change_name}/.openspec.yaml"
      description: "變更元資料（schema, dates）"
    - path: "openspec/changes/{change_name}/proposal.md"
      description: "提案 — Intent / Scope / Approach"
    - path: "openspec/changes/{change_name}/design.md"
      description: "技術設計 — Architecture / Decisions / Tradeoffs"
    - path: "openspec/changes/{change_name}/tasks.md"
      description: "實作清單 — checkbox-based 任務列表"
    - path: "openspec/changes/{change_name}/specs/"
      description: "Delta specs — ADDED / MODIFIED / REMOVED（若有）"

# ── 護欄 ──────────────────────────────────────────────────
guardrails:
  - "必須建立所有 artifacts（proposal、design、tasks）"
  - "建立新 artifact 前必須讀取其相依 artifacts"
  - "context/rules 為 AI 約束，絕不寫入輸出檔"
  - "若 context 嚴重不明確才提問使用者，盡量做合理決策保持推進力"
  - "若同名 change 已存在，必須詢問使用者意圖"
  - "寫入 artifact 後必須驗證檔案存在才繼續下一個"

# ── 錯誤處理 ──────────────────────────────────────────────
error_handling:
  abort_and_log:
    action: "停止執行，顯示失敗步驟與錯誤訊息"
  user_clarification_needed:
    action: "暫停並詢問使用者，取得釐清後繼續"
