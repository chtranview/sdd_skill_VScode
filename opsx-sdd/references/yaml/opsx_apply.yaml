# ============================================================
# opsx_apply.yaml
# 任務實作 · 逐步執行
# 觸發：使用者輸入 /opsx_apply
# ============================================================

module_id: opsx_apply
version: "1.0"
trigger: "/opsx_apply"
description: >
  實作 OpenSpec 變更中的任務。逐一執行 tasks.md 中的待辦事項，
  撰寫程式碼並標記完成。支援中斷後續做、設計議題暫停、
  以及與其他 opsx 指令交錯使用的流動式工作流程。

# ── 輸入參數 ──────────────────────────────────────────────
inputs:
  - field: change_name
    type: string
    required: false
    prompt: "要實作哪個 change？（可留空自動推斷）"
    resolve_order:
      - "使用者明確指定"
      - "從對話脈絡推斷"
      - "若僅一個 active change 則自動選取"
      - "若模糊或多個則列出讓使用者選擇"

# ── 前置條件 ──────────────────────────────────────────────
depends_on:
  - module: opsx_propose
    reads: "openspec/changes/{change_name}/tasks.md"
    required: true
    error_if_missing: "找不到 tasks.md — 請先執行 /opsx_propose 建立變更提案"

# ── 執行邏輯 ──────────────────────────────────────────────
execution:
  mode: loop

  steps:
    - step: 1
      action: select_change
      description: "選取要實作的 change"
      filesystem: "讀取 openspec/changes/ 目錄（排除 archive/）列出活躍 changes"
      logic:
        - condition: "change_name 已提供"
          action: "直接使用"
        - condition: "僅一個 active change"
          action: "自動選取"
        - condition: "多個 active changes"
          prompt_user: "有多個 active changes，請選擇要實作的："
      announce: "使用 change: {change_name}（可用 /opsx_apply <other> 切換）"

    - step: 2
      action: check_status
      description: "確認 schema 與 artifact 狀態"
      filesystem: "讀取 openspec/changes/{change_name}/.openspec.yaml"
      parses:
        schema: "工作流程 schema（spec-driven）"
        artifacts: "所有 artifact 及其狀態"

    - step: 3
      action: read_context
      description: "讀取背景 artifacts"
      reads:
        - "openspec/changes/{change_name}/proposal.md"
        - "openspec/changes/{change_name}/design.md"
        - "openspec/changes/{change_name}/tasks.md"
        - "openspec/changes/{change_name}/specs/"
      handle_states:
        blocked:
          message: "缺少必要 artifacts — 建議先完成提案"
          suggest: "/opsx_propose"
        all_done:
          message: "所有任務已完成！"
          suggest: "/opsx_verify 或 /opsx_archive"

    - step: 4
      action: show_progress
      description: "顯示當前進度概覽"
      display:
        - "Schema：spec-driven"
        - "進度：{complete}/{total} 任務完成"
        - "剩餘任務概覽"

    - step: 5
      action: implement_tasks
      description: "逐一實作待辦任務"
      mode: loop
      loop_over: "tasks → 狀態為 pending 的任務（- [ ]）"

      per_iteration:
        - action: show_current_task
          display: "▶ [{task_index}/{total}] 實作 {task_description}..."

        - action: implement
          description: "撰寫程式碼完成任務"
          constraints:
            - "變更最小化且聚焦於單一任務"
            - "遵循 design.md 中的設計決策"
            - "程式碼風格與專案現有模式一致"

        - action: mark_complete
          description: "在 tasks.md 中標記任務完成"
          transform: "- [ ] {task} → - [x] {task}"
          file: "openspec/changes/{change_name}/tasks.md"

        - action: report_done
          display: "  ✓ 任務完成"

      pause_conditions:
        task_unclear:
          action: "暫停並詢問使用者釐清"
        design_issue:
          action: "暫停並建議更新 artifacts"
        error_or_blocker:
          action: "回報錯誤並等待使用者指引"
        user_interrupts:
          action: "儲存進度，顯示當前狀態"

    - step: 6
      action: show_final_status
      description: "完成或暫停時顯示狀態"
      on_all_done:
        suggest: "/opsx_verify 驗證實作 或 /opsx_archive 歸檔"
      on_paused:
        display: "暫停原因與可選方案"

# ── 輸出 ──────────────────────────────────────────────────
outputs:
  code_changes:
    description: "依任務修改或新增的程式碼檔案"
  task_updates:
    path: "openspec/changes/{change_name}/tasks.md"
    description: "更新的任務清單（完成項標記 [x]）"

# ── 護欄 ──────────────────────────────────────────────────
guardrails:
  - "持續推進任務直到全部完成或遇到阻塞"
  - "開始前必須讀取背景 artifacts"
  - "任務模糊時暫停詢問，不猜測"
  - "實作揭露設計問題時暫停並建議更新 artifacts"
  - "程式碼變更最小化且只針對單一任務"
  - "完成每個任務後立即更新 tasks.md 的 checkbox"
  - "遇到錯誤、阻塞或不明需求時暫停"

# ── 流動式工作流程 ────────────────────────────────────────
fluid_workflow:
  description: >
    此模組支援「actions on a change」模型 —
    可在任何時間點被呼叫，不受階段鎖定。
  capabilities:
    - "所有 artifacts 完成前即可呼叫（只要 tasks 存在）"
    - "部分實作後可呼叫繼續"
    - "可與其他 opsx 指令交錯使用"
    - "實作揭露設計議題時可建議更新 artifacts"
