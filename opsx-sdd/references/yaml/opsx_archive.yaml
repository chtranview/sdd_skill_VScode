# ============================================================
# opsx_archive.yaml
# 變更歸檔 · delta spec 同步
# 觸發：使用者輸入 /opsx_archive
# ============================================================

module_id: opsx_archive
version: "1.0"
trigger: "/opsx_archive"
description: >
  歸檔已完成的變更。檢查 artifact 與 task 完成度，
  評估 delta spec 同步狀態，將變更資料夾移至 archive 並
  可選地將 delta specs 合併至主 specs。

# ── 輸入參數 ──────────────────────────────────────────────
inputs:
  - field: change_name
    type: string
    required: false
    prompt: "要歸檔哪個 change？（必須由使用者確認）"
    resolve_order:
      - "使用者明確指定"
      - "列出所有 active changes 讓使用者選擇"
    rule: "不自動選取，不猜測 — 永遠讓使用者選擇"

# ── 前置條件 ──────────────────────────────────────────────
depends_on:
  - module: opsx_apply
    reads: "openspec/changes/{change_name}/"
    required: true
    error_if_missing: "找不到 change — 請確認名稱是否正確"
  - module: opsx_verify
    required: false
    note: "建議先驗證，但非必要"

# ── delta spec 合併邏輯 ───────────────────────────────────
delta_merge_logic:
  order: [RENAMED, REMOVED, MODIFIED, ADDED]
  description: >
    歸檔時可選擇同步 delta specs 至主 specs。
    合併按以下順序執行以確保正確性。
  operations:
    RENAMED:
      order: 1
      description: "先套用重命名，以便後續 MODIFIED 能對應新名稱"
    REMOVED:
      order: 2
      description: "透過 normalized header 匹配刪除需求"
      matching: "trim + case-sensitive equality"
    MODIFIED:
      order: 3
      description: "透過 normalized header 匹配替換需求"
      matching: "trim + case-sensitive equality"
      note: "使用 RENAMED 後的新名稱"
    ADDED:
      order: 4
      description: "附加至主 spec 末尾"

# ── 執行邏輯 ──────────────────────────────────────────────
execution:
  mode: sequential

  steps:
    - step: 1
      action: select_change
      description: "選取要歸檔的 change — 必須由使用者確認"
      filesystem: "讀取 openspec/changes/ 目錄（排除 archive/）"
      filter: "僅顯示 active changes（排除已歸檔）"
      rule: "不自動選取，不猜測 — 永遠讓使用者選擇"

    - step: 2
      action: check_artifact_completion
      description: "檢查 artifact 完成狀態"
      filesystem: "讀取 openspec/changes/{change_name}/.openspec.yaml"
      on_incomplete:
        severity: warning
        message: "以下 artifacts 未完成：{incomplete_list}"
        prompt_user: "是否仍要繼續歸檔？"
        options: ["繼續歸檔", "取消，先完成 artifacts"]

    - step: 3
      action: check_task_completion
      description: "檢查 task 完成狀態"
      filesystem: "讀取 openspec/changes/{change_name}/tasks.md，統計 checkbox"
      on_no_tasks_file: "跳過任務檢查，無相關警告"
      on_incomplete:
        severity: warning
        message: "有 {incomplete_count}/{total} 個任務未完成"
        prompt_user: "是否仍要繼續歸檔？"

    - step: 4
      action: assess_delta_sync
      description: "評估 delta spec 同步狀態"
      check_path: "openspec/changes/{change_name}/specs/"
      on_no_delta_specs: "無 delta specs — 跳過同步，直接進行歸檔"
      on_delta_specs_exist:
        - analyze: "比對每個 delta spec 與 openspec/specs/<capability>/spec.md"
        - display: "合併摘要 — 新增/修改/刪除/重命名的需求清單"
        - prompt_sync: "詢問使用者是否同步"
        - on_sync: "按 RENAMED → REMOVED → MODIFIED → ADDED 順序合併至主 specs"

    - step: 5
      action: perform_archive
      description: "執行歸檔 — 移動 change 資料夾至 archive"
      sub_steps:
        - ensure_dir: "建立 openspec/changes/archive/（若不存在）"
        - target_name: "YYYY-MM-DD-{change_name}"
        - check_exists: "若目標已存在 → 停止並報錯"
        - move: "openspec/changes/{change_name} → openspec/changes/archive/{target_name}"
        - update_yaml: "更新 .openspec.yaml → status: archived"

    - step: 6
      action: show_summary
      description: "顯示歸檔完成摘要"

# ── 輸出 ──────────────────────────────────────────────────
outputs:
  archive:
    path: "openspec/changes/archive/YYYY-MM-DD-{change_name}/"
    description: "歸檔的變更資料夾（保留所有 artifacts）"
  updated_specs:
    path: "openspec/specs/<capability>/spec.md"
    description: "更新的主 specs（若同步了 delta specs）"
    condition: "使用者選擇同步"

# ── 護欄 ──────────────────────────────────────────────────
guardrails:
  - "永遠詢問使用者選擇 change — 不自動選取"
  - "警告不阻擋歸檔 — 只告知並確認"
  - "移動時保留 .openspec.yaml（隨目錄一起移動）"
  - "顯示清晰的最終摘要"
  - "有 delta specs 時必須執行同步評估並呈現合併摘要"
  - "歸檔目標已存在時必須停止並報錯"
